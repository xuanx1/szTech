<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Semantic Rivers of Chinese Tech — Shenzhen Patent Clustering</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0d12;
    --bg-2: #0e1219;
    --panel: #131722;
    --panel-2: #181d29;
    --panel-3: #1f2533;
    --border: rgba(255,255,255,0.06);
    --border-2: rgba(255,255,255,0.10);
    --text: #e8ecef;
    --text-2: rgba(232,236,239,0.72);
    --text-3: rgba(232,236,239,0.50);
    --text-4: rgba(232,236,239,0.30);
    --accent: #7C5CFF;
    --sans: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --cn: "Noto Sans SC", "IBM Plex Sans", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    background:
      radial-gradient(1200px 600px at 20% 0%, rgba(124,92,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 80% 100%, rgba(34,211,168,0.06), transparent 55%),
      var(--bg);
    color: var(--text);
    overflow: hidden;
    font-size: 13px;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ─── Shell ─────────────────────────────────────────────────────────── */
  .shell {
    display: flex; flex-direction: column;
    height: 100vh; min-height: 0;
  }
  .body {
    display: grid;
    grid-template-columns: 280px 1fr 360px;
    flex: 1; min-height: 0;
    gap: 0;
  }

  /* ─── Top bar ───────────────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: stretch; justify-content: space-between;
    padding: 0 20px;
    height: 76px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,13,18,0.6);
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 60;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    padding-right: 24px;
  }
  .brandmark { display: block; }
  .brand-name {
    font-family: var(--mono); font-weight: 600; font-size: 14px;
    letter-spacing: 0.16em; color: var(--text);
  }
  .brand-sub {
    font-size: 11px; color: var(--text-3);
    margin-top: 2px; letter-spacing: 0.01em;
  }

  .topbar-mid {
    display: flex; align-items: center; gap: 24px;
    flex: 1; justify-content: center;
  }
  .divider-v {
    width: 1px; height: 32px; background: var(--border);
  }

  .seg-wrap { display: flex; flex-direction: column; gap: 6px; }
  .seg-label {
    font-family: var(--mono); font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.18em; color: var(--text-4);
    display: inline-flex; align-items: center; gap: 4px;
    cursor: default;
  }
  .seg {
    display: flex;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
    gap: 1px;
  }
  .seg-btn {
    appearance: none; border: 0; background: transparent;
    color: var(--text-3);
    font-family: var(--sans); font-size: 11.5px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 1px;
    min-width: 64px;
    transition: background 160ms ease, color 160ms ease;
  }
  .seg-btn:hover { color: var(--text-2); }
  .seg-btn-label { font-weight: 500; }
  .seg-btn-sub {
    font-family: var(--mono); font-size: 9.5px; opacity: 0.55;
    letter-spacing: 0.04em;
  }
  .seg-btn.on {
    background: rgba(124,92,255,0.18);
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(124,92,255,0.35) inset;
  }
  .seg-btn.on .seg-btn-sub { color: #b9a8ff; }

  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .lang-toggle {
    display: flex;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 2px;
  }
  .lang-btn {
    appearance: none; border: 0; background: transparent;
    color: var(--text-3);
    font-family: var(--sans); font-size: 11.5px; font-weight: 500;
    padding: 4px 9px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 140ms ease, color 140ms ease;
    min-width: 24px;
  }
  .lang-btn:hover { color: var(--text-2); }
  .lang-btn.on {
    background: rgba(124,92,255,0.20);
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(124,92,255,0.40) inset;
  }
  .runmeta {
    display: grid; grid-template-columns: auto auto;
    column-gap: 14px; row-gap: 1px;
    font-family: var(--mono); font-size: 10.5px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
  }
  .runmeta-row { display: contents; }
  .runmeta-k { color: var(--text-4); letter-spacing: 0.06em; }
  .runmeta-v { color: var(--text-2); text-align: right; }

  /* ─── Display bar (in-viz settings) ─────────────────────────────────── */
  .dispbar {
    display: flex; align-items: center; gap: 0;
    padding: 0 20px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: rgba(14,18,25,0.6);
    backdrop-filter: blur(20px);
    overflow: visible;
    position: relative;
    z-index: 50;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .dispbar::-webkit-scrollbar { height: 4px; }
  .dispbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .chipgroup {
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    height: 100%;
    flex-shrink: 0;
  }
  .chipgroup:first-child { padding-left: 0; }
  .chipgroup-label {
    font-family: var(--mono); font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.18em; color: var(--text-4);
    display: inline-flex; align-items: center; gap: 4px;
    position: relative;
    cursor: default;
  }
  .hint-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    color: var(--text-3);
    font-family: var(--sans); font-size: 9px; font-weight: 600;
    letter-spacing: 0;
    cursor: help;
    transition: background 160ms ease, color 160ms ease;
  }
  .chipgroup-label:hover .hint-mark,
  .tchip:hover .hint-mark { background: rgba(124,92,255,0.3); color: #ffffff; }

  /* Hover tooltip — appears BELOW any [data-hint] element on hover so it
     doesn't get clipped by the topbar above the dispbar. */
  [data-hint] { position: relative; }
  [data-hint]::after {
    content: attr(data-hint);
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    width: 260px;
    max-width: 80vw;
    padding: 10px 12px;
    background: rgba(20, 25, 35, 0.96);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.4);
    font-family: var(--sans); font-size: 11px; font-weight: 400;
    letter-spacing: 0.005em;
    line-height: 1.5;
    color: var(--text);
    text-transform: none;
    white-space: normal;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 1000;
  }
  [data-hint]:hover::after {
    opacity: 1;
    transform: translateY(0);
  }
  /* Tooltip pointer (arrow up) */
  [data-hint]::before {
    content: "";
    position: absolute;
    top: calc(100% + 4px);
    left: 12px;
    width: 8px; height: 8px;
    background: rgba(20, 25, 35, 0.96);
    border-top: 1px solid rgba(255,255,255,0.10);
    border-left: 1px solid rgba(255,255,255,0.10);
    transform: rotate(45deg) translateY(-4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 1001;
  }
  [data-hint]:hover::before {
    opacity: 1;
    transform: rotate(45deg) translateY(0);
  }
  /* Right-aligned tooltips for the toggles on the right side */
  .dispbar-toggles [data-hint]::after {
    left: auto;
    right: 0;
  }
  .dispbar-toggles [data-hint]::before {
    left: auto;
    right: 12px;
  }
  .chipgroup-chips {
    display: flex; gap: 2px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 2px;
  }
  .chipgroup-divider {
    width: 1px; height: 22px;
    background: var(--border);
    flex-shrink: 0;
  }

  .chip {
    appearance: none; border: 0; background: transparent;
    color: var(--text-3);
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    padding: 4px 9px;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 140ms ease, color 140ms ease;
    letter-spacing: 0.005em;
  }
  .chip:hover { color: var(--text-2); }
  .chip.on {
    background: rgba(124,92,255,0.20);
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(124,92,255,0.40) inset;
  }

  /* Palette swatches */
  .swatch {
    appearance: none; border: 1px solid transparent;
    background: rgba(255,255,255,0.02);
    display: flex; align-items: center; gap: 2px;
    padding: 4px 6px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease;
  }
  .swatch:hover { background: rgba(255,255,255,0.05); }
  .swatch.on {
    background: rgba(124,92,255,0.16);
    border-color: rgba(124,92,255,0.45);
  }
  .swatch-dot {
    width: 8px; height: 8px; border-radius: 50%;
    box-shadow: 0 0 4px rgba(0,0,0,0.3);
  }

  /* Toggle chips */
  .dispbar-spacer { flex: 1; min-width: 16px; }
  .dispbar-toggles {
    display: flex; gap: 4px;
    flex-shrink: 0;
  }
  .tchip {
    appearance: none;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-3);
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    padding: 5px 10px 5px 7px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 140ms ease;
  }
  .tchip:hover { color: var(--text-2); border-color: var(--border-2); }
  .tchip-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 140ms ease, box-shadow 140ms ease;
  }
  .tchip.on {
    background: rgba(124,92,255,0.12);
    border-color: rgba(124,92,255,0.4);
    color: var(--text);
  }
  .tchip.on .tchip-dot {
    background: #22D3A8;
    box-shadow: 0 0 6px #22D3A8;
  }

  /* ─── Rivers ────────────────────────────────────────────────────────── */
  /* Each segment of the focused river phases through bright on a delay
     proportional to its arc-length position — a gradient wave that follows
     the curve at every point. */
  @keyframes river-wave {
    0%, 100% { stroke-opacity: 0; }
    30%      { stroke-opacity: 0.25; }
    50%      { stroke-opacity: 1; }
    70%      { stroke-opacity: 0.25; }
  }
  .river-wave {
    animation: river-wave 2.8s linear infinite;
  }

  /* ─── Rails ─────────────────────────────────────────────────────────── */
  .rail {
    background: var(--bg-2);
    display: flex; flex-direction: column;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .rail::-webkit-scrollbar { width: 6px; }
  .rail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .rail-l { border-right: 1px solid var(--border); }
  .rail-r { border-left: 1px solid var(--border); }

  .rail-hd {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .rail-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .rail-sub {
    margin-top: 4px;
    font-size: 11px; color: var(--text-3);
    line-height: 1.5;
  }
  .badge {
    font-family: var(--mono); font-size: 9.5px;
    padding: 2px 6px;
    background: rgba(124,92,255,0.18);
    color: #b9a8ff;
    border-radius: 4px;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  /* Cluster list */
  .cluster-list {
    padding: 8px 8px;
    display: flex; flex-direction: column; gap: 1px;
  }
  .cluster-row {
    appearance: none; border: 0; background: transparent;
    display: grid;
    grid-template-columns: 12px 1fr 44px 44px;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-2);
    font-family: inherit; font-size: 12px;
    text-align: left;
    transition: background 160ms ease, opacity 160ms ease;
  }
  .cluster-row:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .cluster-row.on { background: rgba(124,92,255,0.10); color: var(--text); }
  .cluster-row.dim { opacity: 0.35; }
  .cluster-dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }
  .cluster-meta {
    display: flex; align-items: baseline;
    min-width: 0;
  }
  .cluster-name {
    font-size: 12px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .cluster-tag { display: none; }
  .cluster-bar {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }
  .cluster-bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 2px;
    transition: width 280ms ease;
  }
  .cluster-n {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-3); text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .rail-foot {
    margin-top: auto;
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .legend-tiny {
    display: flex; align-items: center; gap: 8px;
    font-size: 10.5px; color: var(--text-3);
  }
  .dot-tiny {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-tiny.ring {
    background: transparent;
    border: 1px solid var(--text-3);
    width: 6px; height: 6px;
  }

  /* ─── Map ───────────────────────────────────────────────────────────── */
  .map-wrap {
    position: relative;
    display: flex; flex-direction: column;
    min-height: 0;
    background: var(--bg);
  }
  .map-chrome {
    position: absolute; top: 18px; left: 24px; right: 200px;
    display: flex; align-items: flex-start; justify-content: space-between;
    pointer-events: none;
    z-index: 5;
  }
  .map-title { display: flex; flex-direction: column; gap: 4px; }
  .map-eyebrow {
    font-family: var(--mono); font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.22em; color: var(--text-3);
  }
  .map-h {
    font-size: 13px; color: var(--text-2);
  }
  .map-scalebar {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .scalebar-line {
    width: 64px; height: 1px; background: var(--text-3);
    position: relative;
  }
  .scalebar-line::before, .scalebar-line::after {
    content: ""; position: absolute; top: -3px; width: 1px; height: 7px;
    background: var(--text-3);
  }
  .scalebar-line::before { left: 0; }
  .scalebar-line::after { right: 0; }
  .scalebar-label {
    font-family: var(--mono); font-size: 9.5px; color: var(--text-3);
    letter-spacing: 0.08em;
  }

  .map {
    flex: 1;
    min-height: 0;
    width: 100%;
    display: block;
  }

  .dlabel {
    font-family: var(--sans); font-weight: 600; font-size: 12.5px;
    fill: rgba(255,255,255,0.95);
    paint-order: stroke;
    stroke: rgba(0,0,0,0.55);
    stroke-width: 2.5px;
    stroke-linejoin: round;
    letter-spacing: 0.02em;
  }
  .dlabel-cn {
    font-family: var(--cn); font-weight: 500; font-size: 10.5px;
    fill: rgba(255,255,255,0.55);
    paint-order: stroke;
    stroke: rgba(0,0,0,0.55);
    stroke-width: 2px;
  }
  .dlabel-tag {
    font-family: var(--mono); font-weight: 500; font-size: 9.5px;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.6);
    stroke-width: 2px;
    letter-spacing: 0.04em;
  }
  .compass-n {
    fill: rgba(255,255,255,0.7);
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.1em;
  }
  .region-label {
    font-family: var(--mono); font-size: 22px; font-weight: 600;
    fill: rgba(255,255,255,0.22);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.5);
    stroke-width: 2.5px;
  }
  .region-label-cn {
    font-family: var(--cn); font-size: 19px; font-weight: 500;
    fill: rgba(255,255,255,0.18);
    letter-spacing: 0.18em;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.5);
    stroke-width: 2px;
  }

  .map-foot {
    display: grid;
    grid-template-columns: auto auto auto 1fr;
    gap: 32px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: rgba(10,13,18,0.55);
    backdrop-filter: blur(20px);
  }

  /* ─── World inset (you-are-here) ────────────────────────────────────── */
  .winset {
    position: absolute;
    right: 18px;
    top: 18px;
    width: 168px;
    background: rgba(10, 13, 18, 0.78);
    border: 1px solid var(--border-2);
    border-radius: 8px;
    padding: 4px 4px 6px;
    z-index: 4;
    pointer-events: none;
    backdrop-filter: blur(14px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.32);
  }
  .map-scalebar-floating {
    position: absolute;
    left: 22px;
    bottom: 84px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    z-index: 4;
    pointer-events: none;
  }
  .map-compass {
    position: absolute;
    right: 22px;
    bottom: 84px;
    width: 44px; height: 44px;
    z-index: 4;
    pointer-events: none;
  }
  .map-scalebar-floating .scalebar-line {
    width: 72px; height: 1px;
    background: rgba(255,255,255,0.5);
    position: relative;
  }
  .map-scalebar-floating .scalebar-line::before,
  .map-scalebar-floating .scalebar-line::after {
    content: ""; position: absolute; top: -3px; width: 1px; height: 7px;
    background: rgba(255,255,255,0.5);
  }
  .map-scalebar-floating .scalebar-line::before { left: 0; }
  .map-scalebar-floating .scalebar-line::after { right: 0; }
  .map-scalebar-floating .scalebar-label {
    font-family: var(--mono); font-size: 10px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.10em;
    paint-order: stroke;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .winset-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.16em; color: var(--text-4);
    text-align: center;
    margin-top: 2px;
  }
  .winset-city {
    font-family: var(--mono); font-size: 6.5px;
    fill: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
  }
  .winset-here {
    font-family: var(--mono); font-size: 7.5px; font-weight: 600;
    fill: #ffffff;
    letter-spacing: 0.12em;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.6);
    stroke-width: 1.5px;
  }
  .winset-country {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    fill: rgba(255,255,255,0.18);
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .winset-country-cn {
    font-family: var(--cn); font-size: 8.5px; font-weight: 500;
    fill: rgba(255,255,255,0.14);
    letter-spacing: 0.18em;
  }
  .foot-stat { display: flex; flex-direction: column; gap: 3px; }
  .foot-stat.flex { text-align: right; justify-self: end; }
  .foot-k {
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.16em; color: var(--text-4);
  }
  .foot-v {
    font-size: 12px; color: var(--text-2);
  }
  .foot-v.small { font-size: 11px; color: var(--text-3); }
  .num { font-variant-numeric: tabular-nums; }

  /* ─── Right rail: overview ──────────────────────────────────────────── */
  .kpi {
    padding: 18px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .kpi-k {
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.14em; color: var(--text-4);
  }
  .kpi-v {
    font-size: 32px; font-weight: 600;
    margin-top: 6px;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .kpi-sub {
    margin-top: 4px;
    font-size: 11px; color: var(--text-3);
  }

  .section-h {
    padding: 16px 20px 8px;
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 0.14em; color: var(--text-4);
  }

  .topdist {
    padding: 0 16px 8px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .topdist-row {
    display: grid;
    grid-template-columns: 16px 70px 1fr 64px;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 6px;
  }
  .topdist-row:hover { background: rgba(255,255,255,0.025); }
  .topdist-rank {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-4); text-align: center;
  }
  .topdist-en { font-size: 12.5px; font-weight: 500; }
  .topdist-cn { font-family: var(--cn); font-size: 10.5px; color: var(--text-3); }
  .topdist-bar {
    height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px;
    overflow: hidden;
  }
  .topdist-fill { height: 100%; border-radius: 2px; }
  .topdist-n {
    font-family: var(--mono); font-size: 11px; text-align: right;
    color: var(--text-2); font-variant-numeric: tabular-nums;
  }

  .method {
    padding: 4px 20px 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .method-step {
    display: grid; grid-template-columns: 22px 1fr; gap: 12px;
    align-items: flex-start;
  }
  .step-n {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-3);
  }
  .step-h { font-size: 12.5px; font-weight: 500; margin-bottom: 2px; }
  .step-d { font-size: 11px; color: var(--text-3); line-height: 1.5; }

  /* ─── Right rail: district detail ───────────────────────────────────── */
  .postal {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-4); letter-spacing: 0.12em;
  }
  .district-name {
    font-size: 26px; font-weight: 600;
    margin-top: 4px; letter-spacing: -0.015em;
  }
  .district-cn {
    font-family: var(--cn); font-size: 14px;
    color: var(--text-3); margin-top: 1px;
  }

  .dominant {
    margin: 16px 20px 0;
    padding: 14px 16px;
    border: 1px solid;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }
  .dominant-k {
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.16em; color: var(--text-4);
  }
  .dominant-v {
    margin-top: 6px;
    font-size: 16px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .dominant-dot {
    width: 8px; height: 8px; border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
  }
  .dominant-pct {
    margin-top: 4px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-3);
  }

  .trio {
    margin: 16px 20px 0;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .trio-cell {
    padding: 12px;
    border-right: 1px solid var(--border);
  }
  .trio-cell:last-child { border-right: 0; }
  .trio-k {
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.12em; color: var(--text-4);
  }
  .trio-v {
    margin-top: 4px;
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .unit {
    font-size: 11px; color: var(--text-3); font-weight: 400;
    margin-left: 2px;
  }

  .mix {
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .mix-row {
    appearance: none; border: 0; background: transparent;
    display: grid;
    grid-template-columns: 10px 1fr 60px 36px;
    align-items: center;
    gap: 10px;
    padding: 6px 6px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-2);
    font-family: inherit; font-size: 11.5px;
    text-align: left;
  }
  .mix-row:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .mix-dot { width: 8px; height: 8px; border-radius: 50%; }
  .mix-label { font-size: 11.5px; }
  .mix-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .mix-fill { height: 100%; border-radius: 2px; }
  .mix-pct {
    font-family: var(--mono); font-size: 10.5px;
    text-align: right; color: var(--text-3);
  }

  .phrases {
    padding: 4px 16px 8px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .phrase {
    font-family: var(--mono); font-size: 10.5px;
    padding: 3px 7px;
    border: 1px solid;
    border-radius: 4px;
    background: rgba(255,255,255,0.015);
    letter-spacing: 0.01em;
  }

  .assignees {
    padding: 4px 16px 24px;
    display: flex; flex-direction: column;
  }
  .assignee {
    display: grid;
    grid-template-columns: 8px 1fr 60px;
    align-items: center;
    gap: 10px;
    padding: 7px 6px;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .assignee:first-child { border-top: 0; }
  .assignee-dot { width: 6px; height: 6px; border-radius: 50%; }
  .assignee-name { color: var(--text-2); }
  .assignee-n {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-3); text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Cluster detail ────────────────────────────────────────────────── */
  .back-btn {
    appearance: none; border: 0; background: transparent;
    color: var(--text-3); font-family: var(--mono); font-size: 10.5px;
    padding: 0 0 8px 0; cursor: pointer;
    letter-spacing: 0.08em;
  }
  .back-btn:hover { color: var(--text); }
  .cdetail-h {
    font-size: 22px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
    margin-top: 2px;
    letter-spacing: -0.01em;
  }
  .cdetail-dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 14px currentColor;
  }

  .conc { padding: 0 16px 8px; display: flex; flex-direction: column; gap: 2px; }
  .conc-row {
    display: grid;
    grid-template-columns: 18px 1fr 60px 36px;
    align-items: center; gap: 10px;
    padding: 6px 6px; border-radius: 6px;
    font-size: 11.5px;
  }
  .conc-row:hover { background: rgba(255,255,255,0.03); }
  .conc-rank {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-4); text-align: center;
  }
  .conc-name { color: var(--text-2); }
  .conc-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .conc-fill { height: 100%; border-radius: 2px; }
  .conc-n {
    font-family: var(--mono); font-size: 10.5px;
    text-align: right; color: var(--text-3);
  }

  /* ─── Boot ──────────────────────────────────────────────────────────── */
  .boot {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh;
    color: var(--text-3);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  }
  .boot-bar {
    display: flex; gap: 4px; margin-bottom: 16px;
  }
  .boot-bar span {
    width: 32px; height: 2px; background: rgba(255,255,255,0.1);
    border-radius: 1px;
    animation: boot 1.4s ease-in-out infinite;
  }
  .boot-bar span:nth-child(2) { animation-delay: 0.2s; }
  .boot-bar span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes boot {
    0%, 100% { background: rgba(255,255,255,0.08); }
    50%      { background: rgba(124,92,255,0.6); }
  }

  /* Small screens: collapse rails */
  @media (max-width: 1400px) {
    .body { grid-template-columns: 240px 1fr 320px; }
    .topbar-mid { gap: 18px; }
  }
  @media (max-width: 1200px) {
    .runmeta { display: none; }
  }
</style>
</head>
